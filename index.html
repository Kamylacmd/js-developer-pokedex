<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site Pokemon</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css" integrity="sha512-NhSC1YmyruXifcj/KFRWoC561YpHpc5Jtzgvbuzx5VozKpWvQ+4nXhPdFgmx8xqexRcpAglTj9sIBWINXa8x5w==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="./assets/css/global.css">
    <link rel="stylesheet" href="./assets/css/pokemon.css">
    <link rel="stylesheet" href="./assets/css/pokedex.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
</head>
<body>
    
    <section class="container">
        <h1>Pokedex</h1>
        <ol id="pokemonsCardsOl" class="pokemons">
        </ol>
    </section>

    <div class="page">
        <button id="load-more" type="button"> Load More</button>
    </div>

    <div id="tela_escura">

        <div id="cardPokemonDetails" class="grass" data-aos="flip-right">
            <img src="imgs/pokebola.png" alt="pokebola" class="pokebola">
            <div class="back">
               <svg id="close" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" />
                </svg>

                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M21 8.25c0-2.485-2.099-4.5-4.688-4.5-1.935 0-3.597 1.126-4.312 2.733-.715-1.607-2.377-2.733-4.313-2.733C5.1 3.75 3 5.765 3 8.25c0 7.22 9 12 9 12s9-4.78 9-12Z" />
                </svg>

            </div>
            
            <div class="pokemon-details">
                <div class="pokemon-names">
                    <span class="number"></span>
                    <h2></h2>
                    <ul class="types">
                        <li class="type"></li>
                        <li class="type"></li>
                    </ul>
                </div>
            </div>

                <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/dream-world/1.svg" alt="pokemon" class="pokemon-image">

                <div class="pokemon-characteristics">
                    <table class="table-bar">
                        <tr>
                            <td id="about" class="text-bar">Sobre</td>
                            <td id="base-status" class="text-bar">Base Status</td>

                        </tr>
                    </table>
                    
                      <table class="table-characteristics">
                        
                    </table>

                    <table class="table-base">
                        
                    </table>
                </div>
        </div>
    </div>

    <script src="./assets/js/Pokedex/pokedexApi.js"></script>
    <script src="./assets/js/Pokedex/pokedex.js"></script>
    <script src="./assets/js/ApiPokemon/poke-api.js"></script>
    <script src="./assets/js/ApiPokemon/pokemon-model.js"></script>
    <script src="./assets/js/ApiPokemon/main.js"></script>
    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <script>
        AOS.init();
    </script>
</body>
</html>
